<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Modern Todo App | Devjit Mondal</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

  <!-- Toastify -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

  <!-- Custom CSS -->
  <link rel="stylesheet" href="./src/css/style.css">
</head>

<body class="dark">

  <main class="container-app">

    <!-- Header -->
    <header class="header">

      <div>
        <h1 class="title">
          <i class="fa-solid fa-list-check"></i>
          Modern Todo
        </h1>

        <p class="subtitle">
          Stay organized and productive every day 🚀
        </p>
      </div>

      <button id="themeBtn" class="theme-btn">
        <i class="fa-solid fa-moon"></i>
      </button>

    </header>

    <!-- Stats -->
    <section class="stats-grid">

      <div class="stat-card">
        <h3 id="totalTasks">0</h3>
        <p>Total Tasks</p>
      </div>

      <div class="stat-card">
        <h3 id="completedTasks">0</h3>
        <p>Completed</p>
      </div>

      <div class="stat-card">
        <h3 id="pendingTasks">0</h3>
        <p>Pending</p>
      </div>

    </section>

    <!-- Search -->
    <section class="glass-card p-6 mb-6">

      <input
        id="searchInput"
        type="text"
        placeholder="Search tasks..."
        class="input-field">

    </section>

    <!-- Add Task -->
    <section class="glass-card p-6 mb-8">

      <div class="grid md:grid-cols-2 gap-4">

        <input
          id="taskInput"
          type="text"
          placeholder="Task title"
          class="input-field">

        <select
          id="categoryInput"
          class="input-field">

          <option value="Work">Work</option>
          <option value="Study">Study</option>
          <option value="Personal">Personal</option>
          <option value="Shopping">Shopping</option>

        </select>

        <select
          id="priorityInput"
          class="input-field">

          <option value="High">High Priority</option>
          <option value="Medium">Medium Priority</option>
          <option value="Low">Low Priority</option>

        </select>

        <input
          id="dueDateInput"
          type="date"
          class="input-field">

      </div>

      <button
        id="addBtn"
        class="primary-btn mt-5">

        <i class="fa-solid fa-plus"></i>
        Add Task

      </button>

    </section>

    <!-- Filters -->
    <section class="filter-wrapper">

      <button
        class="filter-btn active"
        data-filter="all">

        All

      </button>

      <button
        class="filter-btn"
        data-filter="active">

        Active

      </button>

      <button
        class="filter-btn"
        data-filter="completed">

        Completed

      </button>

    </section>

    <!-- Task List -->
    <section>

      <div
        id="taskList"
        class="space-y-5">

      </div>

    </section>

    <!-- EDIT MODAL -->

<div
  id="editModal"
  class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50">

  <div
    class="glass-card p-8 w-[90%] max-w-md">

    <h2 class="text-2xl font-bold mb-5">
      Edit Task
    </h2>

    <input
      id="editTaskInput"
      type="text"
      class="input-field mb-5">

    <div class="flex gap-4">

      <button
        id="saveEditBtn"
        class="primary-btn flex-1">

        Save

      </button>

      <button
        id="cancelEditBtn"
        class="bg-red-500 px-6 rounded-xl">

        Cancel

      </button>

    </div>

  </div>

</div>

  </main>

  <!-- Footer -->

<footer class="footer">

  <div class="footer-content">

    <p>
      © 2026 Devjit Mondal. Built with ❤️ using HTML, Tailwind CSS & JavaScript.
    </p>

    <div class="social-links">

      <a
        href="https://github.com/devjit1520"
        target="_blank"
        aria-label="GitHub">

        <i class="fa-brands fa-github"></i>

      </a>

      <a
        href="https://www.linkedin.com/in/devjit-mondal-b68947233/"
        target="_blank"
        aria-label="LinkedIn">

        <i class="fa-brands fa-linkedin"></i>

      </a>

    </div>

  </div>

</footer>

  <!-- Sortable JS -->
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

  <!-- Toastify -->
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

  <!-- Main App -->
  <script type="module" src="./src/js/app.js"></script>

</body>

</html>
